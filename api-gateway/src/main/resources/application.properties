spring.application.name=api-gateway
server.port=${SERVER_PORT:8085}

security.jwt.secret=${JWT_SECRET:TXlTdXBlclNlY3JldEtleUZvckF1dGhTZXJ2aWNlSldUMjAyNg==}

rate-limit.auth.capacity=${RATE_LIMIT_AUTH_CAPACITY:5}
rate-limit.auth.refill-period-seconds=${RATE_LIMIT_AUTH_REFILL_PERIOD_SECONDS:60}
rate-limit.api.capacity=${RATE_LIMIT_API_CAPACITY:30}
rate-limit.api.refill-period-seconds=${RATE_LIMIT_API_REFILL_PERIOD_SECONDS:60}

spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=${AUTH_SERVICE_URL:http://${AUTH_SERVICE_HOST:localhost}:${AUTH_SERVICE_PORT:8080}}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=event-service
spring.cloud.gateway.server.webflux.routes[1].uri=${EVENT_SERVICE_URL:http://${EVENT_SERVICE_HOST:localhost}:${EVENT_SERVICE_PORT:8081}}
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/events/**

spring.cloud.gateway.server.webflux.routes[2].id=reservation-service
spring.cloud.gateway.server.webflux.routes[2].uri=${RESERVATION_SERVICE_URL:http://${RESERVATION_SERVICE_HOST:localhost}:${RESERVATION_SERVICE_PORT:8082}}
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/reservations/**
