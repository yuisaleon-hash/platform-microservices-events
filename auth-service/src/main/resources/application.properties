spring.application.name=auth-service

# =========================
# DATABASE CONFIGURATION
# =========================
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=postgres
spring.datasource.password=Isabel1978

spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================
# SERVER
# =========================
server.port=8080

# =========================
# JWT CONFIGURATION
# =========================
security.jwt.secret=TXlTdXBlclNlY3JldEtleUZvckF1dGhTZXJ2aWNlSldUMjAyNg==
security.jwt.expiration=86400000

# =========================
# KAFKA BASE CONFIGURATION
# =========================
app.kafka.enabled=false
app.kafka.topics.user-registered=user.registered
app.kafka.topics.reservation-created=reservation.created
app.kafka.topics.payment-completed=payment.completed

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.kafka.consumer.group-id=auth-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
