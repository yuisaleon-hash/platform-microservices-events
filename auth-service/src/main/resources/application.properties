spring.application.name=auth-service

# =========================
# DATABASE CONFIGURATION
# =========================
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${AUTH_DB_NAME:auth_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:Isabel1978}

spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================
# SERVER
# =========================
server.port=${SERVER_PORT:8080}

# =========================
# JWT CONFIGURATION
# =========================
security.jwt.secret=${JWT_SECRET:TXlTdXBlclNlY3JldEtleUZvckF1dGhTZXJ2aWNlSldUMjAyNg==}
security.jwt.expiration=${JWT_EXPIRATION:86400000}

# =========================
# KAFKA BASE CONFIGURATION
# =========================
app.kafka.enabled=false
app.kafka.topics.user-registered=user.registered
app.kafka.topics.reservation-created=reservation.created
app.kafka.topics.payment-completed=payment.completed

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.kafka.consumer.group-id=auth-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
